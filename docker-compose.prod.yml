# ══════════════════════════════════════════════════════════════════
# DocIQ – Production Compose Override
# ══════════════════════════════════════════════════════════════════
# Layer on top of the base docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds:
#   • Nginx reverse proxy with rate limiting and security headers
#   • CPU / memory resource limits
#   • Named volumes for persistent output
#   • Log rotation via json-file driver
#   • Restart policies and dependency ordering
# ══════════════════════════════════════════════════════════════════

services:
  # ── Nginx reverse proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: dociq-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      # Uncomment for TLS:
      # - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for TLS:
      # - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── API overrides for production ───────────────────────────────
  api:
    ports: []                     # Remove direct host binding; nginx proxies
    expose:
      - "8000"                    # Only visible within the compose network
    environment:
      - DOCIQ_LOG_LEVEL=${DOCIQ_LOG_LEVEL:-INFO}
      - DOCIQ_LOG_FORMAT=json
      - DOCIQ_API_WORKERS=${DOCIQ_API_WORKERS:-2}
    volumes:
      - dociq_output:/app/output
      - ./data:/data:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  dociq_output:
    driver: local

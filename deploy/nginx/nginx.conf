# ══════════════════════════════════════════════════════════════════
# DocIQ – Nginx Reverse Proxy
# ══════════════════════════════════════════════════════════════════
# Sits in front of the uvicorn API container, providing:
#   • TLS termination (optional – uncomment the 443 block)
#   • Rate limiting (10 req/s burst 20 for /process)
#   • Security headers
#   • Request body size cap (50 MB for document uploads)
#   • Upstream health-aware proxying
# ══════════════════════════════════════════════════════════════════

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # ── Rate limiting zones ──────────────────────────────────────
    # General API: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    # Document processing: 10 req/s per IP (heavier endpoint)
    limit_req_zone $binary_remote_addr zone=api_process:10m rate=10r/s;

    # ── Upstream ─────────────────────────────────────────────────
    upstream dociq_api {
        server api:8000;
    }

    # ── HTTP server ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Uncomment the next two lines to redirect HTTP → HTTPS
        # return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Security headers ─────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"  always;
        add_header X-Frame-Options         "DENY"     always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # ── Upload size cap ──────────────────────────────────────
        client_max_body_size 50m;

        # ── Health endpoints (no rate limit) ─────────────────────
        location /health {
            proxy_pass http://dociq_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ready {
            proxy_pass http://dociq_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Document processing (stricter rate limit) ────────────
        location /process {
            limit_req zone=api_process burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://dociq_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeout for OCR-heavy documents
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── All other API routes ─────────────────────────────────
        location / {
            limit_req zone=api_general burst=40 nodelay;
            limit_req_status 429;

            proxy_pass http://dociq_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
